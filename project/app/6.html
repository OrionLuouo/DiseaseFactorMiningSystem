<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>疾病预测系统 · 智能健康分析平台</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
        /* ========== 水晶质感配色 ========== */
        :root {
            --bg-1: #a8edea;
            --bg-2: #fed6e3;
            --bg-3: #c2e9fb;
            --bg-4: #d4baf7;
            --crystal-bg: rgba(255, 255, 255, 0.28);
            --crystal-border: rgba(255, 255, 255, 0.55);
            --crystal-shadow: 0 8px 32px rgba(120, 130, 200, 0.25);
            --text-main: #2d3a5e;
            --text-soft: #5a6890;
            --accent: #6c8cff;
            --accent-2: #b07cff;
            --accent-3: #ff7eb3;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif;
            min-height: 100vh;
            color: var(--text-main);
            background:
                radial-gradient(circle at 15% 20%, var(--bg-1) 0%, transparent 45%),
                radial-gradient(circle at 85% 15%, var(--bg-3) 0%, transparent 50%),
                radial-gradient(circle at 75% 85%, var(--bg-2) 0%, transparent 50%),
                radial-gradient(circle at 20% 80%, var(--bg-4) 0%, transparent 50%),
                linear-gradient(135deg, #f0f4ff 0%, #fff0f6 100%);
            background-attachment: fixed;
            padding: 30px 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before, body::after {
            content: "";
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.5;
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            width: 350px; height: 350px;
            background: radial-gradient(circle, rgba(255,255,255,0.7), transparent);
            top: -80px; left: -80px;
        }
        body::after {
            width: 450px; height: 450px;
            background: radial-gradient(circle, rgba(255, 200, 230, 0.6), transparent);
            bottom: -120px; right: -120px;
        }

        h1 {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(120deg, var(--accent), var(--accent-2), var(--accent-3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        .subtitle {
            text-align: center;
            color: var(--text-soft);
            font-size: 14px;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* ========== 水晶卡片 ========== */
        .card {
            background: var(--crystal-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--crystal-border);
            border-radius: 20px;
            padding: 28px;
            box-shadow: var(--crystal-shadow);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(120, 130, 200, 0.35);
        }

        .card h2 {
            font-size: 18px;
            color: var(--text-main);
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 1px dashed rgba(108, 140, 255, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card h2::before {
            content: "";
            display: inline-block;
            width: 4px;
            height: 16px;
            background: linear-gradient(180deg, var(--accent), var(--accent-2));
            border-radius: 2px;
        }

        .dynamic-fields { flex: 1; }

        .form-group {
            margin-bottom: 18px;
            padding: 0 2px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: var(--text-soft);
            font-weight: 500;
        }
        label .required-star {
            color: #e74c3c;
            margin-left: 2px;
        }
        .field-hint {
            display: block;
            font-size: 12px;
            color: var(--text-soft);
            opacity: 0.7;
            margin-top: 4px;
        }

        /* ========== 输入框 ========== */
        input[type="number"], input[type="text"], select {
            width: 100%;
            padding: 11px 14px;
            font-size: 14px;
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.25);
            border: 1.5px solid rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            outline: none;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        input[type="number"]:hover, input[type="text"]:hover, select:hover {
            background: rgba(255, 255, 255, 0.55);
            border-color: rgba(108, 140, 255, 0.5);
            box-shadow: 0 4px 14px rgba(108, 140, 255, 0.15);
            transform: translateY(-1px);
        }

        input[type="number"]:focus, input[type="text"]:focus, select:focus {
            background: rgba(255, 255, 255, 0.85);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(108, 140, 255, 0.18), 0 6px 20px rgba(108, 140, 255, 0.25);
        }

        input[readonly] { background: rgba(255, 255, 255, 0.15); cursor: not-allowed; }

        /* ========== 复选框（bool 类型） ========== */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 0;
        }
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent-2);
            cursor: pointer;
            flex-shrink: 0;
        }
        .checkbox-group label {
            margin-bottom: 0;
            cursor: pointer;
            font-weight: 400;
        }

        /* ========== 翻页控件 ========== */
        .pagination {
            margin-top: 24px;
            padding-top: 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .pagination .nav-group { display: flex; gap: 10px; }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            background: rgba(255, 255, 255, 0.6);
            color: var(--text-main);
            border: 1.5px solid rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px);
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.9);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(108, 140, 255, 0.2);
        }

        .btn:active:not(:disabled) { transform: translateY(0); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .btn-primary {
            background: linear-gradient(120deg, var(--accent), var(--accent-2));
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 14px rgba(108, 140, 255, 0.3);
        }
        .btn-primary:hover:not(:disabled) {
            background: linear-gradient(120deg, var(--accent-2), var(--accent-3));
            box-shadow: 0 8px 24px rgba(108, 140, 255, 0.4);
        }

        .btn-success {
            background: linear-gradient(120deg, #4dd4ac, #2ecc71);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 14px rgba(77, 212, 172, 0.3);
        }
        .btn-success:hover:not(:disabled) {
            background: linear-gradient(120deg, #2ecc71, #27ae60);
            box-shadow: 0 8px 24px rgba(77, 212, 172, 0.4);
        }

        .btn-outline { background: transparent; border-color: rgba(255, 255, 255, 0.5); }
        .btn-outline:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.4);
            border-color: var(--accent);
        }

        .page-indicator {
            font-size: 14px;
            color: var(--text-soft);
            font-weight: 500;
            background: rgba(255, 255, 255, 0.4);
            padding: 4px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px);
        }

        /* ========== 加载状态 ========== */
        .loading-overlay {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            color: var(--text-soft);
        }
        .loading-spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(108, 140, 255, 0.15);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ========== 结果区 ========== */
        #result {
            display: none;
            animation: fadeIn 0.6s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-summary {
            background: linear-gradient(135deg, rgba(108,140,255,0.12), rgba(176,124,255,0.12));
            border: 1px solid rgba(108, 140, 255, 0.25);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 18px;
        }
        .disease-name {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(120deg, var(--accent), var(--accent-3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .confidence-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }
        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-3));
            border-radius: 4px;
            transition: width 1s ease;
        }

        #chart {
            width: 100%;
            height: 320px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 14px;
            padding: 10px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .comparison-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 10px;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
        }
        .comparison-table thead tr {
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            color: white;
        }
        .comparison-table th, .comparison-table td {
            padding: 11px;
            text-align: center;
            font-size: 13px;
            color: var(--text-main);
        }
        .comparison-table tbody tr { transition: all 0.25s ease; }
        .comparison-table tbody tr:hover {
            background: rgba(108, 140, 255, 0.08);
            transform: scale(1.01);
        }
        .comparison-table tbody tr td:first-child { font-weight: 600; }

        .status-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-normal {
            background: rgba(77, 212, 172, 0.2);
            color: #2a9d8f;
            border: 1px solid rgba(77, 212, 172, 0.4);
        }
        .status-high {
            background: rgba(255, 107, 139, 0.2);
            color: #d63b5e;
            border: 1px solid rgba(255, 107, 139, 0.4);
        }
        .status-low {
            background: rgba(255, 184, 77, 0.2);
            color: #c97a1f;
            border: 1px solid rgba(255, 184, 77, 0.4);
        }

        .empty-tip {
            text-align: center;
            color: var(--text-soft);
            padding: 60px 20px;
            font-size: 14px;
        }
        .empty-tip::before {
            content: "🩺";
            display: block;
            font-size: 50px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .loading {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        .error-msg {
            padding: 20px;
            background: rgba(255, 107, 139, 0.15);
            border: 1px solid rgba(255, 107, 139, 0.3);
            border-radius: 14px;
            color: #c0392b;
            text-align: center;
        }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
            h1 { font-size: 24px; }
            .pagination { flex-direction: column; align-items: stretch; }
            .pagination .nav-group { justify-content: center; }
            .btn { flex: 1; justify-content: center; }
        }
    </style>
</head>
<body>

    <h1>智能疾病预测系统</h1>
    <p class="subtitle">基于关联规则与机器学习的健康风险评估平台 · Crystal UI</p>

    <div class="container">
        <!-- 左侧：动态表单 + 翻页 -->
        <div class="card">
            <h2 id="pageTitle">📋 加载中...</h2>
            <div class="dynamic-fields" id="fieldsContainer">
                <div class="loading-overlay">
                    <div class="loading-spinner"></div>
                    <span>正在加载表单配置...</span>
                </div>
            </div>

            <div class="pagination">
                <div class="nav-group">
                    <button class="btn btn-outline" id="prevBtn" disabled>← 上一页</button>
                    <button class="btn btn-primary" id="nextBtn">下一页 →</button>
                </div>
                <div class="page-indicator" id="pageIndicator">0 / 0</div>
                <button class="btn btn-success" id="predictBtn">🔮 开始预测</button>
            </div>
        </div>

        <!-- 右侧：预测结果 -->
        <div class="card">
            <h2>📊 预测结果</h2>
            <div id="result">
                <div class="result-summary">
                    <div style="font-size:13px;color:var(--text-soft);margin-bottom:4px;">AI 预测判断</div>
                    <div class="disease-name" id="disease-result"></div>
                    <div style="font-size:13px;color:var(--text-soft);margin-top:8px;">
                        置信度：<span id="confidence-text" style="color:var(--accent);font-weight:600;"></span>
                    </div>
                    <div class="confidence-bar">
                        <div class="confidence-fill" id="confidence-fill"></div>
                    </div>
                </div>
                <h3 style="margin:16px 0 10px;font-size:15px;color:var(--text-main);">📊 指标雷达对比</h3>
                <div id="chart"></div>
                <h3 style="margin:16px 0 10px;font-size:15px;color:var(--text-main);">📋 详细对比</h3>
                <table class="comparison-table" id="comparison-table">
                    <thead>
                        <tr><th>指标</th><th>您的数值</th><th>正常范围</th><th>状态</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            <div id="empty-result" class="empty-tip">
                请填写左侧信息后点击 "开始预测"<br>系统将基于关联规则为您分析健康状况
            </div>
        </div>
    </div>

<script>
    // ================================================================
    //  0. 正常范围字典（用于生成 comparison）
    // ================================================================
    const NORMAL_RANGES = {
        // 基本信息（gender 无正常范围，跳过）
        // 生命体征
        sbp: [90, 140],
        dbp: [60, 90],
        pulse: [60, 100],
        // 体格指标
        weight: [50, 80],       // 示例，实际可按性别/身高调整
        height: [150, 190],     // 示例
        bmi: [18.5, 24.9],
        // 血液检查
        cholesterol: [125, 200],
        white_blood_cells: [4.0, 10.0],
        red_blood_cells: [4.2, 5.9],
        hemoglobin: [13.0, 17.5],
        platelets: [150, 400],
        // 生化指标
        glucose: [70, 100],
        triglycerides: [50, 150],
        creatinine: [0.6, 1.2],
        phosphorus: [2.5, 4.5],
        potassium: [3.5, 5.0],
        albumin: [3.4, 5.4],
        blood_urea_nitrogen: [7, 20],
        bicarbonate: [22, 29],
        sodium: [136, 145],
        globulin: [2.0, 3.5],
        // 饮食与生活习惯（多数无固定正常范围，这里仅示例）
        salt_intake: [1, 5],
        daily_calories: [1200, 2500],
        daily_protein: [50, 150],
        daily_carbs: [130, 300],
        daily_fiber: [25, 40],
        daily_fat: [20, 70],
        daily_water: [1500, 3000],
        alcohol_freq: [0, 3],
        night_urination: [0, 1],
        sitting_hours: [0, 480],
        sleep_hours: [6, 9],
        snoring_freq: [0, 2],
        // 布尔字段（无正常范围，跳过）
    };

    // ================================================================
    //  配置：后端 API 地址
    // ================================================================
    const API_BASE = 'http://localhost:5000';
    const API = {
        PAGE_CONFIG: API_BASE + '/page_config',   // 仍使用该接口获取表单配置
        PREDICT: API_BASE + '/predict',            // POST 预测
    };

    // ================================================================
    //  状态管理
    // ================================================================
    let currentPage = 0;
    let totalPages = 0;
    let pageConfig = [];
    const answers = {};

    const fieldsContainer = document.getElementById('fieldsContainer');
    const pageTitle = document.getElementById('pageTitle');
    const pageIndicator = document.getElementById('pageIndicator');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const predictBtn = document.getElementById('predictBtn');

    const resultDiv = document.getElementById('result');
    const emptyResult = document.getElementById('empty-result');
    const diseaseResult = document.getElementById('disease-result');
    const confidenceText = document.getElementById('confidence-text');
    const confidenceFill = document.getElementById('confidence-fill');
    const chartContainer = document.getElementById('chart');
    const tableBody = document.querySelector('#comparison-table tbody');

    let chartInstance = null;

    // ================================================================
    //  1. 加载页面配置（保持不变）
    // ================================================================
    async function loadPageConfig() {
        try {
            const response = await fetch(API.PAGE_CONFIG);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }
            const data = await response.json();
            if (!Array.isArray(data) || data.length === 0) {
                throw new Error('后端返回的配置为空或格式错误（应为数组）');
            }
            const pages = data.map(categoryObj => {
                const title = categoryObj.category || '未命名分类';
                const fields = (categoryObj.data_list || []).map(field => {
                    const id = field.data;
                    const label = field.data;
                    let type = field.type;
                    let defaultValue = field.default;
                    const hint = field.information || '';
                    const required = field.necessary === true;
                    let controlType = 'text';
                    let step = undefined;
                    if (type === 'float') {
                        controlType = 'number';
                        step = 0.01;
                    } else if (type === 'int') {
                        controlType = 'number';
                        step = 1;
                    } else if (type === 'bool') {
                        controlType = 'checkbox';
                    } else if (type === 'str') {
                        controlType = 'text';
                    } else {
                        controlType = 'text';
                    }
                    return { id, label, controlType, defaultValue, hint, required, step };
                });
                return { title, fields };
            });
            pageConfig = pages;
            totalPages = pageConfig.length;
            for (const page of pageConfig) {
                for (const field of page.fields) {
                    if (field.controlType === 'checkbox') {
                        answers[field.id] = field.defaultValue === true;
                    } else {
                        answers[field.id] = field.defaultValue !== undefined ? field.defaultValue : '';
                    }
                }
            }
            currentPage = 0;
            renderPage(currentPage);
            console.log(`✅ 页面配置加载成功，共 ${totalPages} 页`);
        } catch (error) {
            console.error('❌ 加载页面配置失败:', error);
            fieldsContainer.innerHTML = `
                <div class="error-msg">
                    <strong>⚠️ 加载表单配置失败</strong><br>
                    ${error.message}<br>
                    <small>请检查后端服务是否正常运行，或刷新页面重试</small>
                </div>
            `;
            prevBtn.disabled = true;
            nextBtn.disabled = true;
            predictBtn.disabled = true;
        }
    }

    // ================================================================
    //  2. 渲染当前页（保持不变）
    // ================================================================
    function renderPage(pageIndex) {
        if (!pageConfig.length || pageIndex >= pageConfig.length) return;
        const page = pageConfig[pageIndex];
        pageTitle.textContent = `📋 ${page.title}`;
        pageIndicator.textContent = `${pageIndex + 1} / ${totalPages}`;
        prevBtn.disabled = pageIndex === 0;
        nextBtn.textContent = pageIndex === totalPages - 1 ? '完成 ✅' : '下一页 →';
        let html = '';
        for (const field of page.fields) {
            const val = answers[field.id] ?? '';
            const requiredAttr = field.required ? 'required' : '';
            const requiredStar = field.required ? '<span class="required-star">*</span>' : '';
            if (field.controlType === 'checkbox') {
                const checked = val === true ? 'checked' : '';
                html += `
                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="cb_${field.id}" data-id="${field.id}" ${checked} />
                        <label for="cb_${field.id}">${field.label} ${requiredStar}</label>
                        ${field.hint ? `<span class="field-hint">${field.hint}</span>` : ''}
                    </div>
                `;
            } else {
                let inputHtml = '';
                if (field.controlType === 'number') {
                    const stepAttr = field.step ? `step="${field.step}"` : '';
                    inputHtml = `
                        <input type="number" data-id="${field.id}" value="${val}"
                               ${stepAttr} ${requiredAttr} />
                    `;
                } else {
                    inputHtml = `
                        <input type="text" data-id="${field.id}" value="${val}" ${requiredAttr} />
                    `;
                }
                html += `
                    <div class="form-group">
                        <label>${field.label} ${requiredStar}</label>
                        ${inputHtml}
                        ${field.hint ? `<span class="field-hint">${field.hint}</span>` : ''}
                    </div>
                `;
            }
        }
        fieldsContainer.innerHTML = html;
        bindEvents(page);
    }

    function bindEvents(page) {
        const inputs = fieldsContainer.querySelectorAll('input[data-id]');
        inputs.forEach(input => {
            const id = input.dataset.id;
            input.removeEventListener('input', handleInput);
            input.addEventListener('input', handleInput);
            function handleInput(e) {
                const value = e.target.value;
                if (input.type === 'number') {
                    answers[id] = value === '' ? '' : parseFloat(value);
                } else {
                    answers[id] = value;
                }
            }
        });
        const checkboxes = fieldsContainer.querySelectorAll('input[type="checkbox"][data-id]');
        checkboxes.forEach(cb => {
            const id = cb.dataset.id;
            cb.removeEventListener('change', handleCheckbox);
            cb.addEventListener('change', handleCheckbox);
            function handleCheckbox(e) {
                answers[id] = e.target.checked;
            }
        });
    }

    // ================================================================
    //  3. 导航（保持不变）
    // ================================================================
    function goToPage(pageIndex) {
        if (pageIndex < 0 || pageIndex >= totalPages) return;
        currentPage = pageIndex;
        renderPage(currentPage);
        document.querySelector('.card').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function nextPage() {
        if (currentPage < totalPages - 1) {
            goToPage(currentPage + 1);
        } else {
            predict();
        }
    }

    function prevPage() {
        if (currentPage > 0) {
            goToPage(currentPage - 1);
        }
    }

    // ================================================================
    //  4. 预测（修改请求格式 & 响应解析）
    // ================================================================
    async function predict() {
        const btn = predictBtn;
        const originalText = btn.textContent;
        btn.innerHTML = '<span class="loading"></span>分析中...';
        btn.disabled = true;

        try {
            // 收集所有字段值
            const userData = {};
            for (const [key, val] of Object.entries(answers)) {
                userData[key] = val;
            }

            // 按照文档构造请求体
            const requestBody = {
                data: userData,
                history: {},          // 前端暂未提供病史，传空对象
                top_n: 3
            };

            const response = await fetch(API.PREDICT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody)
            });

            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`后端错误 (${response.status}): ${errText}`);
            }

            const result = await response.json();
            renderResult(result, userData);

        } catch (error) {
            console.error('预测失败:', error);
            alert('预测服务异常：' + error.message);
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }

    // ================================================================
    //  5. 结果渲染（适配文档返回字段）
    // ================================================================
    function renderResult(result, userData) {
        emptyResult.style.display = 'none';
        resultDiv.style.display = 'block';

        // 去除 "患病情况_" 前缀
        let diseaseName = result.top_disease || '未知';
        if (diseaseName.startsWith('患病情况_')) {
            diseaseName = diseaseName.replace('患病情况_', '');
        }
        diseaseResult.textContent = diseaseName;

        const conf = result.confidence || 0;
        const confPercent = (conf * 100).toFixed(1);
        confidenceText.textContent = confPercent + '%';
        confidenceFill.style.width = confPercent + '%';

        // 生成 comparison：结合 normal_reference 和 NORMAL_RANGES
        const comparison = {};
        const normalRef = result.normal_reference || {};

        for (const [key, value] of Object.entries(userData)) {
            // 只处理数值型字段，且存在于 NORMAL_RANGES 中
            if (typeof value === 'number' && NORMAL_RANGES.hasOwnProperty(key)) {
                const range = NORMAL_RANGES[key];
                const low = range[0];
                const high = range[1];
                let status = '正常';
                if (value < low) status = '偏低';
                else if (value > high) status = '偏高';
                comparison[key] = {
                    value: value,
                    normal_range: [low, high],
                    status: status
                };
            }
        }

        // 如果 comparison 为空，添加提示
        if (Object.keys(comparison).length === 0) {
            comparison['提示'] = {
                value: '—',
                normal_range: ['—', '—'],
                status: '无参考'
            };
        }

        updateChart(comparison);
        updateTable(comparison);
    }

    // ================================================================
    //  6. 可视化（ECharts 雷达图）— 保持不变
    // ================================================================
    function updateChart(comparison) {
        if (chartInstance) chartInstance.dispose();
        chartInstance = echarts.init(chartContainer);

        const indicators = [];
        const userValues = [];
        const normalValues = [];
        const stdValues = [];

        for (const [key, val] of Object.entries(comparison)) {
            if (key === '提示') continue;
            const maxVal = Math.max(val.value, val.normal_range[1]) * 1.2;
            indicators.push({ name: key, max: maxVal });
            userValues.push(val.value);
            normalValues.push(val.normal_range[1]);
            stdValues.push((val.normal_range[0] + val.normal_range[1]) / 2);
        }

        if (indicators.length === 0) {
            chartInstance.setOption({
                title: { text: '暂无数据可对比', left: 'center', top: 'center' }
            });
            return;
        }

        chartInstance.setOption({
            tooltip: { trigger: 'item' },
            legend: {
                data: ['您的数值', '正常上限', '标准中位'],
                orient: 'vertical',
                right: 10,
                bottom: 10,
                textStyle: { color: '#5a6890', fontSize: 12 }
            },
            radar: {
                indicator: indicators,
                center: ['50%', '50%'],
                radius: '60%',
                splitArea: {
                    areaStyle: {
                        color: ['rgba(108,140,255,0.05)', 'rgba(176,124,255,0.08)',
                            'rgba(108,140,255,0.05)', 'rgba(176,124,255,0.08)'
                        ]
                    }
                },
                axisLine: { lineStyle: { color: 'rgba(108,140,255,0.3)' } },
                splitLine: { lineStyle: { color: 'rgba(108,140,255,0.3)' } },
                name: { textStyle: { color: '#2d3a5e', fontSize: 12 } }
            },
            series: [{
                type: 'radar',
                data: [
                    {
                        value: userValues,
                        name: '您的数值',
                        areaStyle: { color: 'rgba(255, 107, 139, 0.35)' },
                        lineStyle: { color: '#ff6b8b', width: 2 },
                        itemStyle: { color: '#ff6b8b' }
                    },
                    {
                        value: normalValues,
                        name: '正常上限',
                        lineStyle: { color: '#4dd4ac', width: 2, type: 'dashed' },
                        itemStyle: { color: '#4dd4ac' }
                    },
                    {
                        value: stdValues,
                        name: '标准中位',
                        areaStyle: { color: 'rgba(108,140,255,0.2)' },
                        lineStyle: { color: '#6c8cff', width: 2 },
                        itemStyle: { color: '#6c8cff' }
                    }
                ]
            }]
        });
        chartInstance.resize();
    }

    // ================================================================
    //  7. 结果表格（保持不变）
    // ================================================================
    function updateTable(comparison) {
        tableBody.innerHTML = '';
        for (const [key, val] of Object.entries(comparison)) {
            const statusClass =
                val.status === '正常' ? 'status-normal' :
                val.status === '偏高' ? 'status-high' :
                val.status === '偏低' ? 'status-low' : '';
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${key}</td>
                <td>${val.value}</td>
                <td>${val.normal_range[0]} - ${val.normal_range[1]}</td>
                <td><span class="status-tag ${statusClass}">${val.status}</span></td>
            `;
            tableBody.appendChild(row);
        }
    }

    // ================================================================
    //  8. 窗口 resize 重绘图表
    // ================================================================
    window.addEventListener('resize', () => {
        if (chartInstance) chartInstance.resize();
    });

    // ================================================================
    //  9. 键盘支持
    // ================================================================
    document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
            e.preventDefault();
            nextPage();
        } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
            e.preventDefault();
            if (currentPage > 0) prevPage();
        }
    });

    // ================================================================
    //  10. 按钮事件绑定
    // ================================================================
    prevBtn.addEventListener('click', prevPage);
    nextBtn.addEventListener('click', nextPage);
    predictBtn.addEventListener('click', predict);

    // ================================================================
    //  11. 初始化
    // ================================================================
    document.addEventListener('DOMContentLoaded', () => {
        loadPageConfig();
    });
</script>

</body>
</html>
